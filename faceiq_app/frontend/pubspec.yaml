name: faceiq_app
description: FaceIQ Labs — Facial Ratio Analysis App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.1
  dio: ^5.4.3+1

  # Image picking / camera
  image_picker: ^1.1.2

  # UI & animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0
  lottie: ^3.1.0

  # Utilities
  provider: ^6.1.2
  path_provider: ^2.1.3
  cached_network_image: ^3.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
